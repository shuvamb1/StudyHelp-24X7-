<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StudyHelp 24x7</title>
    <link rel="stylesheet" href="css/loader.css">
    <script src="js/page-loader.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { background-color: var(--bg-section); }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            background: var(--bg-white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            border-top: 5px solid var(--accent-color);
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header .logo-img { height: 60px; margin-bottom: 15px; }
        .auth-header h2 { margin-bottom: 5px; }
        
        .auth-footer { text-align: center; margin-top: 20px; font-size: 0.95rem; display: flex; flex-direction: column; gap: 10px; }
        .error-msg { color: black; font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: none; text-align: center; }
        .success-msg { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html"><img src="assets/images/logo.png" alt="Logo" class="logo-img"></a>
                <h2 id="loginTitle">Welcome Back</h2>
                <p class="text-muted" id="loginSubtitle">Login to access your dashboard.</p>
            </div>
            
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="nameInput" class="form-control" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group" style="margin-bottom: 15px;">
                    <label class="form-label">College Identification Number (CIN)</label>
                    <input type="text" id="cinInput" class="form-control" placeholder="Enter your 10-digit CIN" required>
                </div>

                <div class="form-group" id="passwordGroup" style="margin-bottom: 15px; display: none;">
                    <label class="form-label">Secret Password</label>
                    <input type="password" id="passwordInput" class="form-control" placeholder="Enter admin password">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="loginBtn">Login</button>
            </form>
            
            <div class="auth-footer">
                <div>Don't have an account? <a href="register.html" style="font-weight: 600;">Sign Up</a></div>
                <div><a href="#" id="toggleAdminBtn" style="font-weight: 600; color: var(--text-muted); font-size: 0.85rem;">Login as Admin</a></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        if (localStorage.getItem('token')) {
            window.location.replace('index.html');
        }

        let isAdminLogin = false;
        const toggleBtn = document.getElementById('toggleAdminBtn');
        const passwordGroup = document.getElementById('passwordGroup');
        const passwordInput = document.getElementById('passwordInput');
        const loginTitle = document.getElementById('loginTitle');
        const loginSubtitle = document.getElementById('loginSubtitle');

        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isAdminLogin = !isAdminLogin;
            if (isAdminLogin) {
                passwordGroup.style.display = 'block';
                passwordInput.required = true;
                loginTitle.innerText = 'Admin Login';
                loginSubtitle.innerText = 'Access the admin dashboard.';
                toggleBtn.innerText = 'Back to User Login';
            } else {
                passwordGroup.style.display = 'none';
                passwordInput.required = false;
                passwordInput.value = '';
                loginTitle.innerText = 'Welcome Back';
                loginSubtitle.innerText = 'Login to access your dashboard.';
                toggleBtn.innerText = 'Login as Admin';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('nameInput').value.trim();
            const cin = document.getElementById('cinInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const btn = document.getElementById('loginBtn');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            btn.disabled = true;
            btn.innerText = 'Logging in...';

            const endpoint = isAdminLogin ? '/admin-login' : '/login';
            const bodyData = isAdminLogin ? { name, cin, password } : { name, cin };

            try {
                const response = await fetch(API_BASE_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    window.location.replace(isAdminLogin ? 'admin-dashboard.html' : 'index.html');
                } else {
                    const errText = await response.text();
                    errorMsg.innerText = errText;
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Login';
                }
            } catch (err) {
                errorMsg.innerText = 'Cannot connect to server.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Login';
            }
        });
    </script>
</body>
</html>
