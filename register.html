<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | StudyHelp 24x7</title>
    <link rel="stylesheet" href="css/loader.css">
    <script src="js/page-loader.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { background-color: var(--bg-main); }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            background: var(--bg-white);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            border-top: 5px solid var(--primary-color);
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header .logo-img { height: 60px; margin-bottom: 15px; }
        .auth-header h2 { margin-bottom: 5px; }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .auth-footer { text-align: center; margin-top: 20px; font-size: 0.95rem; }
        .error-msg { color: #c0392b; font-size: 0.95rem; font-weight: 600; margin-bottom: 15px; display: none; text-align: center; }
        .success-msg { color: #27ae60; font-size: 0.95rem; font-weight: 600; margin-bottom: 15px; display: none; text-align: center; }
    </style>
    <script>
        if (localStorage.getItem('token')) {
            window.location.replace('index.html');
        }
    </script>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html"><img src="assets/images/logo.svg" alt="Logo" class="logo-img"></a>
                <h2>Create an Account</h2>
                <p class="text-muted">Join the Xaverian academic community.</p>
            </div>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Full Name *</label>
                    <input type="text" id="nameInput" class="form-control" placeholder="e.g. Rahul Sharma" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">College Identification Number (CIN) *</label>
                    <input type="text" id="cinInput" class="form-control" placeholder="Enter your 10-digit CIN" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Roll Number *</label>
                        <input type="number" id="rollInput" class="form-control" placeholder="e.g. 521" step="1" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Year *</label>
                        <select id="yearInput" class="form-control" required>
                            <option value="" disabled selected>Select</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                            <option value="pg">PG</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Department *</label>
                    <select id="departmentInput" class="form-control" required>
                        <option value="" disabled selected>Select Department</option>
                        <option value="cs">Computer Science</option>
                        <option value="micro">Microbiology</option>
                        <option value="math">Mathematics</option>
                        <option value="stat">Statistics</option>
                        <option value="phy">Physics</option>
                        <option value="bcom">B.Com</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="registerBtn">Sign Up</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html" style="font-weight: 600;">Log In</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('nameInput').value.trim();
            const cin = document.getElementById('cinInput').value.trim();
            const roll = Number(document.getElementById('rollInput').value);
            const year = document.getElementById('yearInput').value;
            const department = document.getElementById('departmentInput').value;

            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const btn = document.getElementById('registerBtn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!Number.isInteger(roll) || roll < 500 || roll > 599) {
                errorMsg.innerText = '❌ Roll number invalid';
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Signing up...';

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, cin, roll, year, department })
                });

                const msg = await response.text();

                if (response.ok) {
                    successMsg.innerText = msg;
                    successMsg.style.display = 'block';
                    setTimeout(() => window.location.replace('login.html'), 2000);
                } else {
                    errorMsg.innerText = msg;
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Sign Up';
                }
            } catch (err) {
                errorMsg.innerText = 'Cannot connect to server.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Sign Up';
            }
        });
    </script>
</body>
</html>
